<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foxtel TV Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@400;600&display=swap" rel="stylesheet">
<style>
  [data-theme="dark"]{--bg:#080e0a;--surf:#0f1a12;--surf2:#142018;--bdr:#1e3325;--acc:#4dff6e;--acc2:#ff4d5e;--acc3:#ffd740;--txt:#d6eed9;--muted:#4a7055;--grid:rgba(77,255,110,0.035);--shadow:rgba(0,0,0,0.55);--glow:rgba(77,255,110,0.18);}
  [data-theme="light"]{--bg:#f0f5f1;--surf:#ffffff;--surf2:#e6f0e8;--bdr:#bdd4c2;--acc:#1a8c35;--acc2:#d42b2b;--acc3:#c47a00;--txt:#172a1c;--muted:#537a5c;--grid:rgba(26,140,53,0.05);--shadow:rgba(0,0,0,0.07);--glow:rgba(26,140,53,0.12);}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased;}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:36px 36px;}

  /* HEADER */
  header{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:8px;height:60px;box-shadow:0 2px 12px var(--shadow);}
  .header-left{display:flex;align-items:center;gap:12px;}
  .site-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.08em;color:var(--txt);line-height:1;}
  .site-title span{color:var(--acc);}
  .ist-clock{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;color:var(--acc3);background:var(--surf2);border:1px solid var(--bdr);padding:4px 10px;border-radius:4px;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .hbtn{background:var(--surf);border:1px solid var(--bdr);border-radius:50px;padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'Barlow',sans-serif;font-size:11px;letter-spacing:.1em;color:var(--muted);transition:all .2s;}
  .hbtn:hover{border-color:var(--acc);color:var(--acc);}
  .hbtn.bebas{font-family:'Bebas Neue',sans-serif;font-size:14px;}
  .hbtn.spinning .si{display:inline-block;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* SEARCH BAR */
  .search-bar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:8px 24px;display:flex;align-items:center;gap:8px;}
  .search-input{flex:1;background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:8px 14px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--txt);outline:none;transition:border-color .2s;}
  .search-input:focus{border-color:var(--acc);}
  .search-input::placeholder{color:var(--muted);}
  .search-clear{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0 4px;display:none;}

  /* DATE PICKER */
  .date-picker-bar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:8px 24px;display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none;}
  .date-picker-bar::-webkit-scrollbar{display:none;}
  .date-pill{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.08em;padding:5px 14px;border-radius:20px;border:1px solid var(--bdr);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
  .date-pill:hover{border-color:var(--acc);color:var(--acc);}
  .date-pill.active{background:var(--acc);border-color:var(--acc);color:#fff;}
  .date-pill.today::after{content:'·TODAY';font-size:8px;margin-left:4px;opacity:.8;}

  /* CHANNEL TABS */
  .channel-tabs{display:flex;background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 24px;}
  .ch-tab{display:flex;align-items:center;gap:8px;padding:12px 20px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.08em;color:var(--muted);white-space:nowrap;position:relative;}
  .ch-tab:hover{color:var(--txt);}
  .ch-tab.active{color:var(--acc);border-bottom-color:var(--acc);}
  .ch-num{font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.1em;background:var(--surf2);border:1px solid var(--bdr);padding:2px 7px;border-radius:3px;color:var(--muted);}
  .ch-tab.active .ch-num{background:var(--acc);border-color:var(--acc);color:#fff;}
  .live-badge{position:absolute;top:8px;right:6px;width:7px;height:7px;background:var(--acc2);border-radius:50%;animation:pulse 2s infinite;display:none;}
  .live-badge.show{display:block;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* DATE BAR */
  .date-bar{background:var(--acc);color:#fff;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .date-display{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.12em;}
  .date-bar-right{display:flex;align-items:center;gap:8px;}
  .cache-pill{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;background:rgba(0,0,0,0.18);padding:4px 12px;border-radius:20px;display:flex;align-items:center;gap:6px;}
  .c-dot{width:6px;height:6px;border-radius:50%;background:#fff;}
  .c-dot.live{animation:pulse 2s infinite;}
  .jump-live-btn{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.1em;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:4px 12px;border-radius:20px;cursor:pointer;transition:all .2s;display:none;}
  .jump-live-btn:hover{background:rgba(0,0,0,0.35);}
  .jump-live-btn.show{display:block;}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surf);border-bottom:1px solid var(--bdr);}
  .stat{padding:12px 16px;border-right:1px solid var(--bdr);text-align:center;}
  .stat:last-child{border-right:none;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--acc3);line-height:1;}
  .stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;margin-top:2px;}

  /* FILTER */
  .filter-bar{padding:8px 24px;display:flex;gap:8px;align-items:center;background:var(--surf);border-bottom:1px solid var(--bdr);flex-wrap:wrap;}
  .filter-lbl{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-right:4px;}
  .fbtn{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.08em;padding:4px 14px;border-radius:50px;border:1px solid var(--bdr);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
  .fbtn:hover{border-color:var(--acc);color:var(--acc);}
  .fbtn.active{background:var(--acc);border-color:var(--acc);color:#fff;}

  /* GUIDE */
  .guide-wrap{padding:10px 24px 48px;position:relative;z-index:1;}

  /* EVENT CARD — Option 5 style */
  .event-card{display:grid;grid-template-columns:72px 120px 1fr 64px;background:var(--surf);border:1px solid var(--bdr);border-radius:10px;margin-top:8px;overflow:hidden;transition:box-shadow .2s,border-color .2s;animation:fadeUp .18s ease;position:relative;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
  .event-card:hover{border-color:var(--acc);box-shadow:0 4px 16px var(--glow);}
  .event-card.is-live{border-color:var(--acc2);}

  /* time col */
  .time-col{padding:12px 10px;display:flex;flex-direction:column;justify-content:center;background:var(--surf2);border-right:1px solid var(--bdr);gap:2px;}
  .t-start{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.06em;line-height:1;}
  .t-dur{font-size:10px;color:var(--muted);margin-top:2px;}

  /* past: grey time, live: red time, upcoming: normal */
  .event-card.is-past .t-start{color:var(--muted);}
  .event-card.is-live .t-start{color:var(--acc2);}
  .event-card.is-upcoming .t-start{color:var(--acc);}

  /* img col */
  .img-col{padding:7px 9px;display:flex;align-items:center;border-right:1px solid var(--bdr);background:var(--surf2);position:relative;}
  .thumb{width:102px;height:57px;object-fit:cover;border-radius:4px;display:block;background:var(--surf2);}
  .thumb-ph{width:102px;height:57px;border-radius:4px;background:var(--surf2);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);}
  .dl-btn{position:absolute;bottom:8px;right:10px;width:26px;height:26px;border-radius:4px;background:var(--surf);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s;opacity:0;text-decoration:none;color:var(--txt);}
  .img-col:hover .dl-btn{opacity:1;}
  .dl-btn:hover{background:var(--acc);border-color:var(--acc);color:#fff;}

  /* progress bar on live event */
  .progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(212,43,43,.15);}
  .progress-fill{height:100%;background:var(--acc2);transition:width 1s linear;}

  /* info col */
  .info-col{padding:10px 14px;display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0;}
  .show-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.02em;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .event-card.is-past .show-title{color:var(--muted);}
  .show-ep{font-size:11px;color:var(--muted);font-weight:300;}
  .event-card.is-past .show-ep{color:var(--bdr);}
  .tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
  .tag{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:.1em;padding:2px 7px;border-radius:10px;border:1px solid var(--bdr);background:var(--surf2);color:var(--muted);}
  .tag-live{background:rgba(212,43,43,.1);border-color:var(--acc2);color:var(--acc2);animation:pulse 2s infinite;}
  .tag-premiere{background:rgba(196,122,0,.1);border-color:var(--acc3);color:var(--acc3);}

  /* meta col — Option 5: status dot + label */
  .meta-col{padding:10px 10px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;min-width:64px;border-left:1px solid var(--bdr);}
  .status-dot{width:8px;height:8px;border-radius:50%;}
  .dot-past{background:var(--bdr);}
  .dot-live{background:var(--acc2);animation:pulse 1.5s infinite;}
  .dot-upcoming{background:var(--acc);}
  .status-txt{font-size:8px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;font-family:'Barlow Condensed',sans-serif;}
  .st-past{color:var(--muted);}
  .st-live{color:var(--acc2);}
  .st-up{color:var(--acc);}

  /* share btn */
  .share-btn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted);padding:2px;transition:color .15s;margin-top:2px;}
  .share-btn:hover{color:var(--acc);}
  .cal-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);padding:2px;transition:color .15s;font-family:'Barlow Condensed',sans-serif;letter-spacing:.05em;}
  .cal-btn:hover{color:var(--acc3);}

  /* STATES */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;gap:14px;}
  .loader{width:32px;height:32px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;}
  .loading-text{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
  .empty-box{text-align:center;padding:4rem 2rem;}
  .empty-box h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.1em;color:var(--acc2);margin-bottom:10px;}
  .empty-box p{font-size:13px;color:var(--muted);line-height:1.7;}

  footer{background:var(--surf);border-top:1px solid var(--bdr);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);flex-wrap:wrap;gap:8px;}
  .eyebrow{font-size:9px;letter-spacing:.3em;color:var(--acc);text-transform:uppercase;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--txt);color:var(--bg);padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;letter-spacing:.05em;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* search highlight */
  .highlight{background:#ffd74066;border-radius:2px;}

  @media(max-width:680px){
    .event-card{grid-template-columns:64px 1fr 52px;}
    .img-col{display:none;}
    .stats-row{grid-template-columns:repeat(2,1fr);}
    header,.channel-tabs,.filter-bar,.guide-wrap,.date-picker-bar,.search-bar{padding-left:14px;padding-right:14px;}
    .ch-tab{padding:12px 14px;}
    .date-bar{padding:8px 14px;}
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="site-title">FOXTEL <span>GUIDE</span></div>
    <div class="ist-clock" id="ist-clock">--:--:-- IST</div>
  </div>
  <div class="header-right">
    <button class="hbtn" onclick="toggleTheme()"><span id="theme-icon">☀️</span> <span id="theme-lbl">LIGHT</span></button>
    <button class="hbtn bebas" id="refresh-btn" onclick="refreshCurrent()"><span class="si">↻</span> REFRESH</button>
  </div>
</header>

<!-- SEARCH -->
<div class="search-bar">
  <input class="search-input" id="search-input" type="text" placeholder="Search shows..." oninput="onSearch(this.value)">
  <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
</div>

<!-- DATE PICKER -->
<div class="date-picker-bar" id="date-picker-bar"></div>

<!-- CHANNEL TABS -->
<div class="channel-tabs">
  <div class="ch-tab active" id="tab-FS1" onclick="switchChannel('FS1')">
    <span class="ch-num">501</span> FOX CRICKET HD
    <span class="live-badge" id="badge-FS1"></span>
  </div>
  <div class="ch-tab" id="tab-FSP" onclick="switchChannel('FSP')">
    <span class="ch-num">505</span> FOX SPORTS 505
    <span class="live-badge" id="badge-FSP"></span>
  </div>
</div>

<!-- DATE BAR -->
<div class="date-bar">
  <div class="date-display" id="date-display">—</div>
  <div class="date-bar-right">
    <button class="jump-live-btn" id="jump-live-btn" onclick="jumpToLive()">⬤ JUMP TO LIVE</button>
    <div class="cache-pill"><div class="c-dot live" id="c-dot"></div><span id="cache-info">Loading...</span></div>
  </div>
</div>

<!-- STATS -->
<div class="stats-row" id="stats-row">
  <div class="stat"><div class="stat-num">—</div><div class="stat-label">Total Shows</div></div>
  <div class="stat"><div class="stat-num">—</div><div class="stat-label">Hours</div></div>
  <div class="stat"><div class="stat-num">—</div><div class="stat-label">Live Now</div></div>
  <div class="stat"><div class="stat-num">—</div><div class="stat-label">Upcoming</div></div>
</div>

<!-- FILTER -->
<div class="filter-bar">
  <span class="filter-lbl">Show:</span>
  <button class="fbtn active" onclick="setFilter('all',this)">All</button>
  <button class="fbtn" onclick="setFilter('live',this)">Live Now</button>
  <button class="fbtn" onclick="setFilter('upcoming',this)">Upcoming</button>
  <button class="fbtn" onclick="setFilter('past',this)">Past</button>
</div>

<!-- GUIDE -->
<div class="guide-wrap">
  <div id="guide-container">
    <div class="loading"><div class="loader"></div><div class="loading-text">Loading Schedule...</div></div>
  </div>
</div>

<footer>
  <span class="eyebrow">Foxtel TV Guide · Auto-updated every 4h · 21 days history</span>
  <span id="footer-info" style="font-size:10px;font-family:monospace">—</span>
</footer>

<div class="toast" id="toast"></div>

<script>
  const REPO_RAW = 'https://raw.githubusercontent.com/Jinx8004NEW/FoxtelEPG/main';
  const CHANNELS = { FS1:{name:'FOX CRICKET HD',number:'501'}, FSP:{name:'FOX SPORTS 505',number:'505'} };

  let currentChannel = 'FS1';
  let currentFilter  = 'all';
  let currentDate    = '';
  let searchQuery    = '';
  let availableDates = { FS1:[], FSP:[] };
  let loadedData     = {};
  let progressTimer  = null;

  /* THEME */
  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
    document.getElementById('theme-lbl').textContent  = isDark ? 'LIGHT' : 'DARK';
  }

  /* CLOCK */
  function updateClock() {
    document.getElementById('ist-clock').textContent = new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}) + ' IST';
  }
  setInterval(updateClock, 1000); updateClock();

  /* TIME HELPERS */
  function toIST(ms) { return new Date(ms).toLocaleString('en-IN',{timeZone:'Asia/Kolkata',hour:'2-digit',minute:'2-digit',hour12:false}); }
  function toISTDate(ms) { return new Date(ms).toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata',weekday:'long',day:'numeric',month:'long',year:'numeric'}).toUpperCase(); }
  function todayIST() { return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'}); }
  function formatDateLabel(d) { return new Date(d+'T12:00:00+05:30').toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata',day:'numeric',month:'short'}).toUpperCase(); }

  /* TOAST */
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* SEARCH */
  function onSearch(val) {
    searchQuery = val.trim().toLowerCase();
    document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
    const key = currentChannel + '_' + currentDate;
    if (loadedData[key]) render(loadedData[key]);
  }
  function clearSearch() {
    document.getElementById('search-input').value = '';
    onSearch('');
  }
  function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark class="highlight">$1</mark>');
  }

  /* LIVE CHANNEL BADGES */
  function updateLiveBadges(tag, events) {
    const now = Date.now();
    const hasLive = events.some(e => now >= e.scheduledDate && now < e.scheduledDate + e.duration*60000);
    const badge = document.getElementById('badge-' + tag);
    if (badge) badge.classList.toggle('show', hasLive);
  }

  /* PROGRESS BAR */
  function updateProgressBars() {
    const now = Date.now();
    document.querySelectorAll('.progress-fill').forEach(el => {
      const start = parseInt(el.dataset.start);
      const end   = parseInt(el.dataset.end);
      const pct   = Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
      el.style.width = pct + '%';
    });
  }
  setInterval(updateProgressBars, 10000);

  /* JUMP TO LIVE */
  function jumpToLive() {
    const liveCard = document.querySelector('.event-card.is-live');
    if (liveCard) liveCard.scrollIntoView({ behavior:'smooth', block:'center' });
  }

  /* SHARE EVENT */
  function shareEvent(title, time, channel) {
    const text = `📺 ${title} — ${time} IST on ${CHANNELS[channel].name}`;
    if (navigator.share) {
      navigator.share({ title, text, url: window.location.href }).catch(() => {});
    } else {
      navigator.clipboard?.writeText(text).then(() => showToast('✓ Copied to clipboard'));
    }
  }

  /* ADD TO CALENDAR */
  function addToCalendar(ev) {
    const start = new Date(ev.scheduledDate);
    const end   = new Date(ev.scheduledDate + ev.duration * 60000);
    const fmt   = d => d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const url   = `https://calendar.google.com/calendar/render?action=TEMPLATE`
      + `&text=${encodeURIComponent(ev.programTitle)}`
      + `&dates=${fmt(start)}/${fmt(end)}`
      + `&details=${encodeURIComponent(ev.episodeTitle + ' on ' + CHANNELS[currentChannel].name)}`;
    window.open(url, '_blank');
  }

  /* FETCH INDEX */
  async function fetchIndex() {
    const res  = await fetch(`${REPO_RAW}/data/index.json?_=${Date.now()}`);
    const data = await res.json();
    availableDates.FS1 = data.FS1 || [];
    availableDates.FSP = data.FSP || [];
    renderDatePicker();
    const today = todayIST();
    const dates = availableDates[currentChannel];
    currentDate = dates.includes(today) ? today : (dates[0] || '');
    if (currentDate) await loadSchedule(currentChannel, currentDate);
  }

  /* DATE PICKER */
  function renderDatePicker() {
    const bar   = document.getElementById('date-picker-bar');
    const dates = availableDates[currentChannel];
    const today = todayIST();
    if (!dates.length) { bar.innerHTML = '<span style="font-size:12px;color:var(--muted)">No data yet</span>'; return; }
    bar.innerHTML = dates.map(d => `
      <button class="date-pill${d===currentDate?' active':''}${d===today?' today':''}" onclick="selectDate('${d}')">${formatDateLabel(d)}</button>
    `).join('');
  }

  async function selectDate(date) {
    currentDate = date;
    renderDatePicker();
    await loadSchedule(currentChannel, date);
  }

  /* CHANNEL SWITCH */
  async function switchChannel(tag) {
    currentChannel = tag;
    document.querySelectorAll('.ch-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tag).classList.add('active');
    renderDatePicker();
    const dates = availableDates[tag];
    const today = todayIST();
    if (!currentDate || !dates.includes(currentDate))
      currentDate = dates.includes(today) ? today : (dates[0] || '');
    if (currentDate) await loadSchedule(tag, currentDate);
    else document.getElementById('guide-container').innerHTML =
      '<div class="empty-box"><h3>No Data</h3><p>No schedule available yet.</p></div>';
  }

  /* FILTER */
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const key = currentChannel + '_' + currentDate;
    if (loadedData[key]) render(loadedData[key]);
  }

  function applyFilter(events) {
    const now = Date.now();
    let evs = events;
    if (currentFilter === 'live')     evs = events.filter(e => now >= e.scheduledDate && now < e.scheduledDate + e.duration*60000);
    else if (currentFilter === 'upcoming') evs = events.filter(e => e.scheduledDate > now);
    else if (currentFilter === 'past')     evs = events.filter(e => now >= e.scheduledDate + e.duration*60000);
    if (searchQuery) evs = evs.filter(e =>
      e.programTitle.toLowerCase().includes(searchQuery) ||
      e.episodeTitle.toLowerCase().includes(searchQuery)
    );
    return evs;
  }

  /* LOAD SCHEDULE */
  async function loadSchedule(tag, date, force = false) {
    const key = tag + '_' + date;
    if (!force && loadedData[key]) { render(loadedData[key]); return; }

    document.getElementById('guide-container').innerHTML =
      `<div class="loading"><div class="loader"></div><div class="loading-text">Loading ${tag} ${date}...</div></div>`;
    try {
      const url  = `${REPO_RAW}/data/${tag}/${date}.json?_=${force ? Date.now() : date}`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      loadedData[key] = data;
      updateLiveBadges(tag, data.events);
      render(data);
    } catch(e) {
      document.getElementById('guide-container').innerHTML =
        `<div class="empty-box"><h3>Not Available</h3><p>Schedule for ${date} not found.</p><p style="margin-top:8px;font-size:12px;color:var(--muted)">${e.message}</p></div>`;
    }
  }

  async function refreshCurrent() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning'); btn.disabled = true;
    loadedData = {};
    await fetchIndex();
    btn.classList.remove('spinning'); btn.disabled = false;
    showToast('✓ Refreshed');
  }

  /* RENDER */
  function render(data) {
    const events  = data.events || [];
    const now     = Date.now();
    const isToday = data.date === todayIST();
    const ago     = Math.round((Date.now() - data.fetchedAt) / 60000);

    document.getElementById('c-dot').className = 'c-dot live';
    document.getElementById('cache-info').textContent = isToday
      ? `Today · fetched ${ago < 60 ? ago+'m ago' : Math.round(ago/60)+'h ago'}`
      : `Archive · ${data.date}`;

    if (events.length) document.getElementById('date-display').textContent = toISTDate(events[0].scheduledDate);

    const liveEvents = events.filter(e => now >= e.scheduledDate && now < e.scheduledDate + e.duration*60000);
    const upcoming   = events.filter(e => e.scheduledDate > now);
    const hours      = Math.round(events.reduce((s,e) => s+e.duration,0) / 60);

    document.getElementById('stats-row').innerHTML = `
      <div class="stat"><div class="stat-num">${events.length}</div><div class="stat-label">Total Shows</div></div>
      <div class="stat"><div class="stat-num">${hours}</div><div class="stat-label">Hours</div></div>
      <div class="stat"><div class="stat-num">${isToday ? liveEvents.length : '—'}</div><div class="stat-label">Live Now</div></div>
      <div class="stat"><div class="stat-num">${isToday ? upcoming.length : '—'}</div><div class="stat-label">Upcoming</div></div>
    `;

    // Show/hide jump to live button
    const jumpBtn = document.getElementById('jump-live-btn');
    jumpBtn.classList.toggle('show', isToday && liveEvents.length > 0);

    document.getElementById('footer-info').textContent =
      `FS1: ${availableDates.FS1.length} days · FSP: ${availableDates.FSP.length} days · 21-day retention`;

    const filtered  = applyFilter(events);
    const container = document.getElementById('guide-container');

    if (!filtered.length) {
      container.innerHTML = `<div class="empty-box"><h3>No Events</h3><p>${searchQuery ? 'No results for "'+searchQuery+'"' : 'No shows match this filter.'}</p></div>`;
      return;
    }

    container.innerHTML = '';
    filtered.forEach(ev => {
      const endTs     = ev.scheduledDate + ev.duration * 60000;
      const isLive    = isToday && now >= ev.scheduledDate && now < endTs;
      const isPast    = isToday && now >= endTs;
      const isUpc     = isToday && ev.scheduledDate > now;
      const pct       = isLive ? Math.min(100, ((now - ev.scheduledDate) / (endTs - ev.scheduledDate)) * 100) : 0;

      let statusClass = '';
      if (isLive) statusClass = 'is-live';
      else if (isPast) statusClass = 'is-past';
      else if (isUpc) statusClass = 'is-upcoming';

      let dotClass = 'dot-upcoming st-up';
      let dotLabel = 'Next';
      if (isLive) { dotClass = 'dot-live st-live'; dotLabel = 'Live'; }
      else if (isPast) { dotClass = 'dot-past st-past'; dotLabel = 'Aired'; }

      const titleHtml = highlight(ev.programTitle, searchQuery);
      const epHtml    = highlight(ev.episodeTitle, searchQuery);

      const card = document.createElement('div');
      card.className = `event-card ${statusClass}`;
      if (isLive) card.id = 'live-card-' + ev.eventId;

      card.innerHTML = `
        <div class="time-col">
          <div class="t-start">${toIST(ev.scheduledDate)}</div>
          <div class="t-dur">${ev.duration} MIN</div>
        </div>
        <div class="img-col">
          <img class="thumb" src="${ev.imageUrl}" alt="${ev.programTitle}"
               loading="lazy" crossorigin="anonymous"
               onerror="this.outerHTML='<div class=thumb-ph>🏏</div>'">
          ${isLive ? `<div class="progress-bar"><div class="progress-fill" data-start="${ev.scheduledDate}" data-end="${endTs}" style="width:${pct}%"></div></div>` : ''}
          <a class="dl-btn" href="${ev.imageUrl}" download="${ev.programTitle}.png" target="_blank" title="Download image">⬇</a>
        </div>
        <div class="info-col">
          <div class="show-title">${titleHtml}</div>
          <div class="show-ep">${epHtml}</div>
          <div class="tags">
            ${isLive ? '<span class="tag tag-live">● LIVE</span>' : ''}
            ${ev.premiereInd ? '<span class="tag tag-premiere">PREMIERE</span>' : ''}
          </div>
        </div>
        <div class="meta-col">
          <div class="status-dot ${dotClass.split(' ')[0]}"></div>
          <span class="status-txt ${dotClass.split(' ')[1]}">${dotLabel}</span>
          <button class="share-btn" onclick='shareEvent("${ev.programTitle.replace(/'/g,"\\'")}","${toIST(ev.scheduledDate)}","${currentChannel}")' title="Share">↗</button>
          ${!isPast ? `<button class="cal-btn" onclick='addToCalendar(${JSON.stringify(ev).replace(/'/g,"&apos;")})' title="Add to calendar">📅</button>` : ''}
        </div>
      `;
      container.appendChild(card);
    });

    updateProgressBars();
  }

  /* AUTO REFRESH */
  setInterval(() => {
    const key = currentChannel + '_' + currentDate;
    if (loadedData[key]) { render(loadedData[key]); updateLiveBadges(currentChannel, loadedData[key].events); }
  }, 60000);

  /* INIT */
  fetchIndex().catch(() => {
    document.getElementById('guide-container').innerHTML =
      '<div class="empty-box"><h3>No Data Yet</h3><p>Go to GitHub repo → Actions tab → Run "Fetch Foxtel Schedule" manually.</p></div>';
    document.getElementById('date-picker-bar').innerHTML =
      '<span style="font-size:12px;color:var(--muted)">Run GitHub Action first</span>';
  });
</script>
</body>
</html>
