name: Fetch Foxtel Schedule

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait before fetch (avoid rate limiting)
        run: sleep 3

      - name: Fetch and save schedule
        run: node scripts/fetch.js
        env:
          REGION_ID: 8336

      - name: Delete JSON files older than 21 days
        run: node scripts/cleanup.js

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Schedule update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
