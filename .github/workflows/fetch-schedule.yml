name: Fetch Foxtel Schedule

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Remove cached images folder (URL-only mode)
        run: |
          if [ -d "data/images" ]; then
            rm -rf data/images
            echo "Removed data/images folder"
          else
            echo "No images folder found"
          fi

      - name: Wait before fetch
        run: sleep 3

      - name: Fetch schedules (today + 2 upcoming days)
        run: node scripts/fetch.js
        env:
          REGION_ID: 8336

      - name: Delete JSON files older than 21 days
        run: node scripts/cleanup.js

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" || git commit -m "Schedule update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
